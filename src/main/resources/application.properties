quarkus.application.name=seaglass-storehouse

%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=seaglass
%dev.quarkus.datasource.password=seaglass
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/seaglass
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.flyway.migrate-at-start=true

%test.quarkus.datasource.devservices.enabled=false
